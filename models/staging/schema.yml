version: 2

models:
  - name: stg_spotify_artists
    description: "Staging to prepare Spotify artists data"
    columns:
      - name: ranking_position
        description: "The position of the artist in the ranking"
        data_tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: artist_name
        description: "Name of the artist"
        data_tests:
          - not_null

      - name: monthly_listeners_millions
        description: "Monthly listeners in millions as of March 2026"
        data_tests:
          - not_null
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: primary_genre
        description: "Primary music genre of the artist"

      - name: artist_country
        description: "Country of origin of the artist"
        data_tests:
          - not_null

      - name: followers_millions
        description: "Total followers in millions"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: grammy_wins
        description: "Number of Grammy Awards won"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: debut_year
        description: "Year the artist debuted"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer
        
      - name: gender
        description: "Gender of the artist"

  - name: stg_spotify_songs
    description: "Staging to prepare Spotify songs data"
    columns:
      - name: ranking_position
        description: "The position of the song in the Spotify Wrapped 2025 ranking"
        data_tests:
          - not_null
          - unique

      - name: song_title
        description: "Title of the song"
        data_tests:
          - not_null

      - name: artist
        description: "Main artist or artists associated with the song"
        data_tests:
          - not_null

      - name: streams_in_billions
        description: "Total streams in 2025, in billions"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: numeric

      - name: primary_genre
        description: "Primary genre classification of the song"

      - name: bpm
        description: "Song tempo in beats per minute"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: duration_in_seconds
        description: "Duration of the song in seconds"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: release_year
        description: "Year when the song was released"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: artist_country
        description: "Country of origin of the artist"
        data_tests:
          - not_null

      - name: is_explicit
        description: "Indicates whether the song contains explicit content"

      - name: danceability
        description: "Danceability score of the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: numeric

      - name: energy
        description: "Energy score of the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: numeric

      - name: valence
        description: "Valence score representing musical positiveness"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: numeric

      - name: acousticness
        description: "Acousticness score of the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: numeric

      - name: highest_ranking
        description: "Best global chart position reached by the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

  - name: stg_spotify_top100
    description: "Staging to prepare Spotify all-time top 100 songs data"
    columns:
      - name: ranking_position
        description: "The position of the song in the all-time top 100 ranking"
        data_tests:
          - not_null
          - unique
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: song_title
        description: "Title of the song"
        data_tests:
          - not_null

      - name: artist
        description: "Main artist or artists associated with the song"
        data_tests:
          - not_null

      - name: streams_in_billions
        description: "Total all-time streams in billions"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: real

      - name: primary_genre
        description: "Primary genre classification of the song"

      - name: bpm
        description: "Song tempo in beats per minute"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: release_year
        description: "Year when the song was released"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: integer

      - name: artist_country
        description: "Country of origin of the artist"
        data_tests:
          - not_null

      - name: is_explicit
        description: "Indicates whether the song contains explicit content"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: boolean

      - name: danceability
        description: "Danceability score of the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: real

      - name: energy
        description: "Energy score of the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: real

      - name: valence
        description: "Valence score representing musical positiveness"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: real

      - name: acousticness
        description: "Acousticness score of the song"
        data_tests:
          - dbt_expectations.expect_column_values_to_be_of_type:
              arguments:
                column_type: real
